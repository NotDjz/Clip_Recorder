<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: 'Segoe UI', system-ui, sans-serif;">
  <title>Clip Recorder Architecture</title>
  <desc>Architecture diagram showing how Clip Recorder captures screen and audio continuously, then saves a replay on hotkey press.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#ff4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" rx="8" fill="#161616"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Clip Recorder — Architecture</text>
  <text x="350" y="48" text-anchor="middle" fill="#999" font-size="11">Continuous capture + instant replay</text>

  <!-- CAPTURE LAYER -->
  <text x="20" y="78" fill="#ff4444" font-size="11" font-weight="bold">CAPTURE</text>

  <rect x="30" y="90" width="130" height="54" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="95" y="112" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Screen</text>
  <text x="95" y="128" text-anchor="middle" fill="#999" font-size="10">DXGI / GDI</text>

  <rect x="220" y="90" width="140" height="54" rx="6" fill="#ff444420" stroke="#ff4444" stroke-width="1.5"/>
  <text x="290" y="112" text-anchor="middle" fill="#ff4444" font-size="12" font-weight="bold">FFmpeg</text>
  <text x="290" y="128" text-anchor="middle" fill="#999" font-size="10">NVENC / x264</text>

  <rect x="420" y="90" width="140" height="54" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="490" y="112" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Segments .ts</text>
  <text x="490" y="128" text-anchor="middle" fill="#999" font-size="10">5s rolling buffer</text>

  <line x1="160" y1="117" x2="218" y2="117" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="117" x2="418" y2="117" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AUDIO LAYER -->
  <text x="20" y="188" fill="#22cc66" font-size="11" font-weight="bold">AUDIO</text>

  <rect x="30" y="200" width="130" height="54" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="95" y="222" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">System Audio</text>
  <text x="95" y="238" text-anchor="middle" fill="#999" font-size="10">WASAPI loopback</text>

  <rect x="220" y="200" width="140" height="54" rx="6" fill="#22cc6620" stroke="#22cc66" stroke-width="1.5"/>
  <text x="290" y="222" text-anchor="middle" fill="#22cc66" font-size="12" font-weight="bold">pyaudiowpatch</text>
  <text x="290" y="238" text-anchor="middle" fill="#999" font-size="10">PCM capture</text>

  <rect x="420" y="200" width="140" height="54" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="490" y="222" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Ring Buffers</text>
  <text x="490" y="238" text-anchor="middle" fill="#999" font-size="10">loopback + mic</text>

  <rect x="30" y="264" width="130" height="34" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="95" y="286" text-anchor="middle" fill="#e0e0e0" font-size="11">Microphone</text>

  <line x1="160" y1="227" x2="218" y2="227" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="281" x2="210" y2="240" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="227" x2="418" y2="227" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Continuous bracket -->
  <rect x="588" y="90" width="90" height="164" rx="20" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="633" y="178" text-anchor="middle" fill="#666" font-size="9" transform="rotate(-90, 633, 178)">CONTINUOUS</text>

  <!-- SAVE REPLAY -->
  <text x="20" y="340" fill="#ffaa22" font-size="11" font-weight="bold">SAVE REPLAY</text>

  <rect x="30" y="352" width="130" height="48" rx="6" fill="#ffaa2220" stroke="#ffaa22" stroke-width="1.5"/>
  <text x="95" y="374" text-anchor="middle" fill="#ffaa22" font-size="12" font-weight="bold">Ctrl+Alt+R</text>
  <text x="95" y="389" text-anchor="middle" fill="#999" font-size="10">Win32 hotkey</text>

  <rect x="220" y="352" width="140" height="48" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="290" y="374" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Concat + Mux</text>
  <text x="290" y="389" text-anchor="middle" fill="#999" font-size="10">video + audio</text>

  <rect x="420" y="352" width="140" height="48" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="490" y="374" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Clip_*.mp4</text>
  <text x="490" y="389" text-anchor="middle" fill="#999" font-size="10">final output</text>

  <line x1="160" y1="376" x2="218" y2="376" stroke="#ffaa22" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <line x1="360" y1="376" x2="418" y2="376" stroke="#ffaa22" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- Feed lines from buffers to concat -->
  <line x1="490" y1="144" x2="490" y2="170" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="490" y1="170" x2="600" y2="170" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="170" x2="600" y2="376" stroke="#ffaa22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="600" y1="376" x2="562" y2="376" stroke="#ffaa22" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <line x1="490" y1="254" x2="490" y2="270" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="490" y1="270" x2="630" y2="270" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="630" y1="270" x2="630" y2="390" stroke="#ffaa22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="630" y1="390" x2="562" y2="390" stroke="#ffaa22" stroke-width="1.5"/>

  <!-- UI LAYER -->
  <text x="20" y="440" fill="#999" font-size="11" font-weight="bold">UI</text>

  <rect x="30" y="452" width="105" height="40" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="82" y="477" text-anchor="middle" fill="#e0e0e0" font-size="11">System Tray</text>

  <rect x="155" y="452" width="105" height="40" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="207" y="477" text-anchor="middle" fill="#22cc66" font-size="11">Banner</text>

  <rect x="280" y="452" width="105" height="40" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="332" y="477" text-anchor="middle" fill="#e0e0e0" font-size="11">Settings</text>

  <rect x="405" y="452" width="120" height="40" rx="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="465" y="477" text-anchor="middle" fill="#e0e0e0" font-size="11">Single Instance</text>

</svg>